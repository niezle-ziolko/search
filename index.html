<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Search</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="box-header">
            <a href="images.html">Image Search</a>
        </div>
        <div class="box-header">
            <a href="advanced.html">Advanced Search</a>
        </div>
    </header>
    <div class="element">
        <div class="container-logo">
            <div class="box-logo">
               <img class="logo" src="./images/logo.png" alt="Google" height="92">
            </div>
        </div>
        <div class="container-form">
            <form action="https://google.com/search">
                <input type="text" name="q" placeholder="Search Google...">
                <input type="submit" value="Google Search">
            </form>
            <button onclick="luckySearch()">I'm Feeling Lucky</button>
        </div>
    </div>
    <footer>
        <div class="country" id="country">
            Loading location...
        </div>
        <div class="footer-element">
            <div class="footer-box">
                <a class="footer-link" href="https://about.google/?utm_source=google-PL&utm_medium=referral&utm_campaign=hp-footer&fg=1">About</a>
                <a class="footer-link" href="https://www.google.com/intl/en_pl/ads/?subid=ww-ww-et-g-awa-a-g_hpafoot1_1!o2&utm_source=google.com&utm_medium=referral&utm_campaign=google_hpafooter&fg=1">Advertising</a>
                <a class="footer-link" href="https://www.google.com/services/?subid=ww-ww-et-g-awa-a-g_hpbfoot1_1!o2&utm_source=google.com&utm_medium=referral&utm_campaign=google_hpbfooter&fg=1">Business</a>
                <a class="footer-link" href="https://google.com/search/howsearchworks/?fg=1">How Search works</a>
            </div>
            <div class="footer-box">
                <a class="footer-link" href="https://policies.google.com/privacy?hl=en-PL&fg=1">Privacy</a>
                <a class="footer-link" href="https://policies.google.com/terms?hl=en-PL&fg=1">Terms</a>
                <div>Theme</div>
            </div>
        </div>
    </footer>

    <script>
        function luckySearch() {
            const query = document.querySelector('input[name="q"]').value;
            if (query) {
                window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}&btnI=1`;
            };
        };

        async function fetchCountry() {
            try {
                const response = await fetch('https://api.my-ip.io/v2/ip.json');

                if (!response.ok) {
                    throw new Error('Failed to fetch country');
                };

                const data = await response.json();
                const country = data.country.name;

                document.getElementById('country').textContent = `${country}`;
            } catch (error) {
                document.getElementById('country').textContent = 'Could not detect your location.';
                console.error(error);
            };
        };

        // Call the function on page load
        fetchCountry();
    </script>
</body>
</html>
